    <noscript>
      <h1>DroneLappen - øv til droneeksamen A1/A3 og A2</h1>
      <p>DroneLappen (dronelappen.app) er en norsk quiz-app for å øve til droneeksamen, ofte kalt dronelappen, i kategori A1/A3 og A2. Du får 238 øvingsspørsmål basert på det offisielle norske pensumet fra Luftfartstilsynet, prøveeksamen i ekte eksamensformat, en øvings-/læringsmodus og en tempomodus. Etter hver økt ser du resultatet med prosent og kan gå gjennom spørsmålene du svarte feil på.</p>
      <p>Prøv gratis med 25 spørsmål uten innlogging. Full tilgang til alle spørsmål og moduser koster 249 kr som engangsbeløp (12 måneders tilgang, ingen abonnement). DroneLappen fungerer på både mobil og PC, og er uten reklame.</p>
      <p>Offisielle ressurser: <a href="https://flydrone.no">flydrone.no</a> (registrering og A1/A3-eksamen hos Luftfartstilsynet), <a href="https://luftfartstilsynet.no/droner/">Luftfartstilsynet</a>, og <a href="https://www.vegvesen.no/forerkort/ta-forerkort/teoriprove/droneeksamen/">Statens vegvesen</a> (A2-eksamen).</p>
    </noscript>
